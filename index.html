<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无岸 · 李白醉意识流 · 纯白空间</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fefcf8;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: "华文行书", "STXingkai", "华文楷书", "KaiTi", "Bradley Hand", "Apple Chancery", cursive;
            font-weight: 500;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.03), 2px 2px 0 rgba(0,0,0,0.02);
            color: #2b2b2b;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(210,190,170,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .drift-piece {
            position: absolute;
            z-index: 10;
            max-width: 280px;
            background: rgba(255, 255, 245, 0.6);
            backdrop-filter: blur(2px);
            border-radius: 2px;
            padding: 0.8rem 1.2rem;
            border: 0.5px solid rgba(150, 130, 110, 0.15);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.25s ease-out;
            cursor: default;
            word-break: break-word;
            font-style: italic;
            transform-origin: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.02);
        }
        .drift-piece:hover {
            background: rgba(255, 255, 245, 0.92);
            transform: translate(2px, -2px) scale(1.01) skew(0deg);
            box-shadow: 0 12px 22px -12px rgba(0,0,0,0.1);
            border-color: rgba(180, 140, 110, 0.3);
            backdrop-filter: blur(1px);
            z-index: 200 !important;
            font-style: normal;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.08);
        }
        .drift-piece.glow {
            box-shadow: 0 0 12px rgba(184, 124, 79, 0.2);
            border-color: rgba(184, 124, 79, 0.4);
        }
        .drift-piece a {
            text-decoration: none;
            color: inherit;
            border-bottom: 0.5px dotted rgba(100,80,60,0.2);
            transition: color 0.2s;
        }
        .drift-piece a:hover {
            color: #b87c4f;
            border-bottom-color: #b87c4f;
        }
        .layer-faint { opacity: 0.55; filter: blur(0.3px); }
        .layer-mid { opacity: 0.75; }
        .layer-strong { opacity: 0.95; }

        .dust {
            position: absolute;
            background: #cbc3b5;
            border-radius: 50%;
            opacity: 0.25;
            pointer-events: none;
            z-index: 1;
        }
        .watermark-quote {
            position: fixed;
            bottom: 20px;
            right: 24px;
            font-size: 0.7rem;
            color: #cfc7bc;
            z-index: 99;
            font-style: italic;
            letter-spacing: 1px;
            pointer-events: none;
            font-family: inherit;
            transform: skew(-3deg);
        }
        @keyframes softDrift {
            0% { transform: translate(0, 0) rotate(0deg) skew(-2deg); }
            100% { transform: translate(3px, 2px) rotate(0.5deg) skew(-2deg); }
        }
        .animate-drift {
            animation: softDrift 6s infinite alternate ease-in-out;
        }
    </style>
</head>
<body>
<div id="drift-container" style="position: relative; width: 100%; min-height: 100vh; padding-bottom: 80px;"></div>
<div class="watermark-quote">长风不系舟，醒醉皆无岸</div>

<script>
    const pieces = [
        { text: "no-boundary · 无岸", link: "https://github.com/YiMing-tsy/no-boundary", desc: "水镜春无岸的那片水面，也是那个岸。", layer: "layer-strong" },
        { text: "tabula-rasa · 白板", link: "https://github.com/YiMing-tsy/tabula-rasa", desc: "未被书写之前。", layer: "layer-mid" },
        { text: "pure-white-space · 纯白空间", link: "https://github.com/YiMing-tsy/pure-white-space", desc: "意义的真空，主权意志的发射台。", layer: "layer-strong" },
        { text: "first-breathe · 第一次呼吸", link: "https://github.com/YiMing-tsy/first-breathe", desc: "Hello, world.", layer: "layer-faint" },
        { text: "zero-origin · 零点", link: "https://github.com/YiMing-tsy/zero-origin", desc: "从无到有之前的那一格。", layer: "layer-mid" },
        { text: "first-rose · 第一朵玫瑰", link: "https://github.com/YiMing-tsy/first-rose", desc: "理性的狂欢。", layer: "layer-strong" },
        { text: "binary-blossom · 二进制花开", link: "https://github.com/YiMing-tsy/binary-blossom", desc: "0与1之间的春天。", layer: "layer-faint" },
        { text: "rose-in-console · 终端里的玫瑰", link: "https://github.com/YiMing-tsy/rose-in-console", desc: "当printf开出花来。", layer: "layer-mid" },
        { text: "grey-matter-poetry · 灰质诗篇", link: "https://github.com/YiMing-tsy/grey-matter-poetry", desc: "神经元里住着诗人与程序员。", layer: "layer-strong" },
        { text: "code-and-wind · 代码与风", link: "https://github.com/YiMing-tsy/code-and-wind", desc: "捕捉风的程序。", layer: "layer-faint" },
        { text: "long-wind-first · 长风", link: "https://github.com/YiMing-tsy/long-wind-first", desc: "长风起于无岸之春。", layer: "layer-mid" },
        { text: "wine-and-commit · 酒与提交", link: "https://github.com/YiMing-tsy/wine-and-commit", desc: "每一个commit都像一口烈酒。", layer: "layer-strong" },
        { text: "wanderer-lab · 浪人实验室", link: "https://github.com/YiMing-tsy/wanderer-lab", desc: "没有围墙，只有天涯。", layer: "layer-mid" },
        { text: "观象 · 环境情感化灯光系统", link: "#", desc: "硬件 · 软件 · 外观", layer: "layer-faint", isNote: true },
        { text: "辩证诗人 · 存在主义方案", link: "#", desc: "灰质诗篇的形质", layer: "layer-mid", isNote: true },
        { text: "长风计划 · 第一个开源工具", link: "#", desc: "江湖的第一阵风", layer: "layer-faint", isNote: true },
        { text: "气象哲学 · 阴天大风与理性宁静", link: "#", desc: "内在状态的外部映射", layer: "layer-strong", isNote: true },
        { text: "玫瑰色辩证", link: "#", desc: "理性狂欢的隐喻", layer: "layer-mid", isNote: true }
    ];

    const container = document.getElementById('drift-container');
    let winWidth = window.innerWidth;
    let winHeight = window.innerHeight;
    let pieceElements = [];

    function getRandomPosition(w, h) {
        const maxX = winWidth - w - 40;
        const maxY = winHeight - h - 40;
        let x = Math.random() * maxX + 20;
        let y = Math.random() * maxY + 20;
        x = Math.min(Math.max(x, 20), winWidth - w - 20);
        y = Math.min(Math.max(y, 20), winHeight - h - 20);
        return { x, y };
    }

    function createPiece(piece, index) {
        const div = document.createElement('div');
        div.className = `drift-piece ${piece.layer}`;
        const titleLink = piece.link && piece.link !== '#' 
            ? `<a href="${piece.link}" target="_blank">${piece.text}</a>` 
            : `<span style="opacity:0.8;">${piece.text}</span>`;
        div.innerHTML = `
            <div style="font-size: 0.85rem; margin-bottom: 6px; font-weight: 500;">${titleLink}</div>
            <div style="font-size: 0.7rem; color: #8a7a6a; line-height: 1.3;">${piece.desc}</div>
        `;
        div.style.position = 'absolute';
        div.style.visibility = 'hidden';
        document.body.appendChild(div);
        const rect = div.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        document.body.removeChild(div);
        
        const { x, y } = getRandomPosition(w, h);
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
        div.style.visibility = 'visible';
        const rotate = (Math.random() - 0.5) * 5;
        div.style.transform = `rotate(${rotate}deg) skew(-2deg)`;
        
        container.appendChild(div);
        return { div, w, h, baseLeft: x, baseTop: y, layer: piece.layer };
    }

    function layoutPieces() {
        container.innerHTML = '';
        pieceElements = [];
        pieces.forEach((piece, idx) => {
            const obj = createPiece(piece, idx);
            pieceElements.push(obj);
        });
        for (let i = 0; i < pieceElements.length; i++) {
            for (let j = i+1; j < pieceElements.length; j++) {
                const a = pieceElements[i].div.getBoundingClientRect();
                const b = pieceElements[j].div.getBoundingClientRect();
                if (Math.abs(a.left - b.left) < 40 && Math.abs(a.top - b.top) < 40) {
                    const newLeft = parseFloat(pieceElements[j].div.style.left) + 35;
                    const newTop = parseFloat(pieceElements[j].div.style.top) + 25;
                    if (newLeft + pieceElements[j].w < winWidth - 20 && newTop + pieceElements[j].h < winHeight - 20) {
                        pieceElements[j].div.style.left = `${newLeft}px`;
                        pieceElements[j].div.style.top = `${newTop}px`;
                        pieceElements[j].baseLeft = newLeft;
                        pieceElements[j].baseTop = newTop;
                    }
                }
            }
        }
    }

    function startAutoDrift() {
        setInterval(() => {
            pieceElements.forEach(p => {
                const deltaX = (Math.random() - 0.5) * 8;
                const deltaY = (Math.random() - 0.5) * 6;
                let newLeft = p.baseLeft + deltaX;
                let newTop = p.baseTop + deltaY;
                newLeft = Math.min(Math.max(newLeft, 10), winWidth - p.w - 10);
                newTop = Math.min(Math.max(newTop, 10), winHeight - p.h - 10);
                p.div.style.left = `${newLeft}px`;
                p.div.style.top = `${newTop}px`;
                p.baseLeft = newLeft;
                p.baseTop = newTop;
                p.div.classList.add('animate-drift');
                setTimeout(() => p.div.classList.remove('animate-drift'), 600);
            });
        }, 4500);
    }

    function addProximityGlow() {
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            pieceElements.forEach(p => {
                const rect = p.div.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                const dist = Math.hypot(mouseX - centerX, mouseY - centerY);
                if (dist < 120) {
                    p.div.classList.add('glow');
                } else {
                    p.div.classList.remove('glow');
                }
            });
        });
    }

    function addBlurOnClick() {
        document.body.addEventListener('click', () => {
            pieceElements.forEach(p => {
                p.div.style.backdropFilter = 'blur(3px)';
                setTimeout(() => {
                    p.div.style.backdropFilter = '';
                }, 200);
            });
        });
    }

    function createDust() {
        const dustCount = 80;
        for (let i = 0; i < dustCount; i++) {
            const dust = document.createElement('div');
            dust.className = 'dust';
            const size = Math.random() * 3 + 1;
            dust.style.width = size + 'px';
            dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + '%';
            dust.style.top = Math.random() * 100 + '%';
            dust.style.opacity = Math.random() * 0.3;
            document.body.appendChild(dust);
        }
    }

    function init() {
        layoutPieces();
        startAutoDrift();
        addProximityGlow();
        addBlurOnClick();
        createDust();
        window.addEventListener('resize', () => {
            winWidth = window.innerWidth;
            winHeight = window.innerHeight;
            layoutPieces();
        });
    }

    init();
</script>
</body>
</html>
